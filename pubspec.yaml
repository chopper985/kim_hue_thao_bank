name: kht_gold
description: "Kim Hue Thao Bank"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.0.0
  bloc_concurrency: ^0.3.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Storage
  hive_ce: ^2.11.3
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4

  # Network
  dio: ^5.8.0+1
  dio_smart_retry: ^7.0.1
  http_parser: ^4.1.2

  # Media
  image_picker: ^1.1.2

  # Utils
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.5
  intl: ^0.20.2
  i18n_extension: ^15.0.4
  permission_handler: ^12.0.1
  phosphor_flutter: ^2.1.0
  cached_network_image: ^3.4.1
  sizer: ^3.1.3
  pull_to_refresh: ^2.0.0
  super_sliver_list: ^0.4.1
  toastification: ^3.0.3

  # Helper
  collection: ^1.19.0
  share_plus: ^11.1.0
  equatable: ^2.0.7

  # Go router
  go_router: ^16.2.2

  

dev_dependencies:
  # Test
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4

  # Config app
  flutter_launcher_icons: ^0.14.4
  package_rename: ^1.7.1
 
  # Code Generator
  injectable_generator: ^2.6.2
  build_runner: ^2.4.13
  flutter_gen_runner: ^5.8.0
  freezed: ^3.0.6
  json_serializable: ^6.11.1
  go_router_builder: ^4.0.1

  # Lints
  import_sorter: ^4.6.0
  flutter_lints: ^6.0.0

flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_100.ttf
          weight: 100
        - asset: assets/fonts/Inter_200.ttf
          weight: 200
        - asset: assets/fonts/Inter_300.ttf
          weight: 300
        - asset: assets/fonts/Inter_400.ttf
          weight: 400
        - asset: assets/fonts/Inter_500.ttf
          weight: 500
        - asset: assets/fonts/Inter_600.ttf
          weight: 600
        - asset: assets/fonts/Inter_700.ttf
          weight: 700
        - asset: assets/fonts/Inter_800.ttf
          weight: 800
        - asset: assets/fonts/Inter_900.ttf
          weight: 900
